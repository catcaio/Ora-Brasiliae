name: CI Scientific Runner

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  notebooks-00-18:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Execute notebooks 00-18
        run: python scripts/run_notebooks_smoke.py
